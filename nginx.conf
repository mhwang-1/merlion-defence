server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Always revalidate HTML so new deploys are picked up immediately
    location ~* \.html$ {
        add_header Cache-Control "no-cache";
    }

    # Assets may be cached but must revalidate with the server on each load;
    # nginx answers 304 Not Modified when unchanged, 200 + new file after a deploy
    location ~* \.(js|css|png|jpg|svg|woff2?)$ {
        add_header Cache-Control "no-cache";
        etag on;
    }
}
